image: node:20-alpine

definitions:
  caches:
    nextcache: testbed/.next/cache
  services:
    docker:
      memory: 3000

pipelines:
  branches:
    develop:
      - step:
          name: Build and Test on Develop Branch
          image: node:20-alpine
          size: 2x
          max-time: 45
          caches:
            - node
            - nextcache
          script:
            - apk add --no-cache python3 make g++
            - cd testbed
            - npm ci || npm install
            - export NODE_OPTIONS="--max-old-space-size=8192 --max-semi-space-size=1024"
            - npm run lint || echo "Linting issues found - continuing with build"
            - npm run type-check || echo "No type checking configured"
            - echo "Running tests..."
            - npm run test
            - echo "Starting production build (npm run build)..."
            - npm run build
            - echo "Build completed successfully"
            - echo "Develop branch validation completed"
          artifacts:
            - testbed/.next/**
          services:
            - docker

    staging:
      - step:
          name: Build & Push Docker Image on Staging Merge
          image: atlassian/default-image:4
          services:
            - docker
          caches:
            - docker
          script:
            - 'apt-get update -qq && apt-get install -y --no-install-recommends curl unzip jq'
            - 'curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip && unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install && rm -rf /tmp/awscliv2.zip /tmp/aws'
            - 'aws --version'
            - 'aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID'
            - 'aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY'
            - 'aws configure set default.region us-east-1'
            - 'aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws'
            - 'export IMAGE_TAG=uicomponent_V1.$BITBUCKET_BUILD_NUMBER'
            - 'export FULL_IMAGE_NAME=public.ecr.aws/x7m1a4o7/mahati/builds:$IMAGE_TAG'
            - 'docker build -t $FULL_IMAGE_NAME .'
            - 'docker push $FULL_IMAGE_NAME'
            - 'echo "uicomponent image built and pushed successfully"'
            - 'echo "Image: $FULL_IMAGE_NAME"'
            - 'echo "Build: $BITBUCKET_BUILD_NUMBER | Tag: $IMAGE_TAG"'
            - 'echo "To deploy: run deploy-to-production with DEPLOY_IMAGE_TAG=$IMAGE_TAG"'
          after-script:
            - 'docker system prune -f'

  # PR validation — Bitbucket matches PR source branch patterns here, SANJEET
  # so guard on BITBUCKET_PR_DESTINATION_BRANCH inside the step.
  pull-requests:
    "**":
      - step:
          name: Validate PR -> Develop
          image: node:20-alpine
          size: 2x
          max-time: 30
          caches:
            - node
            - nextcache
          script:
            - |
              if [ "$BITBUCKET_PR_DESTINATION_BRANCH" != "develop" ]; then
                echo "Skipping PR validation because destination branch is '$BITBUCKET_PR_DESTINATION_BRANCH', not 'develop'."
                exit 0
              fi
            - apk add --no-cache python3 make g++
            - cd testbed
            - npm ci || npm install
            - export NODE_OPTIONS="--max-old-space-size=8192 --max-semi-space-size=1024"
            - echo "Running lint check..."
            - npm run lint || echo "Lint issues found - continuing"
            - echo "Running autofix..."
            - npm run autofix || echo "Autofix completed with warnings"
            - echo "Running tests..."
            - npm run test
            - echo "Running production build (npm run build)..."
            - npm run build
            - echo "Checking for outdated packages..."
            - npm outdated || echo "Some packages may be outdated (non-blocking)"
            - echo "PR -> Develop validation passed"

  custom:
    deploy-to-production:
      - step:
          name: Deploy to Production EC2 (Manual)
          image: atlassian/default-image:4
          script:
            - 'apt-get update -qq && apt-get install -y --no-install-recommends openssh-client curl unzip'
            - 'curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip && unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install && rm -rf /tmp/awscliv2.zip /tmp/aws'
            - 'echo "Setting up SSH key..."'
            - 'mkdir -p ~/.ssh && chmod 700 ~/.ssh'
            - 'echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key'
            - 'ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts'
            - 'export FULL_IMAGE_NAME=public.ecr.aws/x7m1a4o7/mahati/builds:$DEPLOY_IMAGE_TAG'
            - 'echo "Logging into ECR Public on EC2..."'
            - >-
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "
                aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID &&
                aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY &&
                aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
              "
            - 'echo "Pulling image $FULL_IMAGE_NAME ..."'
            - 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "docker pull $FULL_IMAGE_NAME"'
            - 'echo "Stopping existing container..."'
            - 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "docker stop uicomponents-testbed || true && docker rm uicomponents-testbed || true"'
            - 'echo "Starting new container..."'
            - >-
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "
                docker run -d
                --name uicomponents-testbed
                --restart unless-stopped
                -p 3000:3000
                -e NODE_ENV=production
                $FULL_IMAGE_NAME
              "
            - 'echo "Cleaning up old Docker images on EC2..."'
            - 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "docker image prune -f"'
            - 'echo "Running health check..."'
            - 'sleep 10'
            - 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "curl -f http://localhost:3000/api/ui-components-info || (docker logs uicomponents-testbed && exit 1)"'
            - 'echo "uicomponents testbed deployed successfully to EC2"'
            - 'echo "Image: $FULL_IMAGE_NAME"'

    build-production-image:
      - step:
          name: Build and Push Production Docker Image
          image: atlassian/default-image:4
          services:
            - docker
          caches:
            - docker
          script:
            - 'apt-get update -qq && apt-get install -y --no-install-recommends curl unzip jq'
            - 'curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip && unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install && rm -rf /tmp/awscliv2.zip /tmp/aws'
            - 'aws --version'
            - 'aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID'
            - 'aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY'
            - 'aws configure set default.region us-east-1'
            - 'aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws'
            - 'export IMAGE_TAG=uicomponent_V1.$BITBUCKET_BUILD_NUMBER'
            - 'export FULL_IMAGE_NAME=public.ecr.aws/x7m1a4o7/mahati/builds:$IMAGE_TAG'
            - 'docker build -t $FULL_IMAGE_NAME .'
            - 'docker push $FULL_IMAGE_NAME'
            - 'echo "uicomponent image built and pushed successfully"'
            - 'echo "Image: $FULL_IMAGE_NAME"'
            - 'echo "Build: $BITBUCKET_BUILD_NUMBER | Tag: $IMAGE_TAG"'
            - 'echo "Shared ECR repository in use: public.ecr.aws/x7m1a4o7/mahati/builds"'
            - 'echo "To deploy: run deploy-to-production with DEPLOY_IMAGE_TAG=$IMAGE_TAG"'
          after-script:
            - 'docker system prune -f'