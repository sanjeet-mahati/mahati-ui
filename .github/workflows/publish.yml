name: Publish Mahati UI to GitHub Packages

on:
  # Trigger on a pushed version tag (e.g. v6.1.1, v7.0.0)
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Build & Test
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --no-coverage

      - name: Build library
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # 2. Publish to GitHub Packages
  # ─────────────────────────────────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: build-and-test

    permissions:
      contents: read
      packages: write   # Required to publish to GitHub Packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js with GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          # Scopes the registry to @mahatisystems packages
          scope: '@mahatisystems'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package
        run: npm publish
        env:
          # setup-node injects GITHUB_TOKEN automatically when registry-url is set.
          # No extra secret needed — GITHUB_TOKEN is always available in Actions.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print published version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "✅ Published @mahatisystems/mahati-ui-components@${VERSION} to GitHub Packages"
